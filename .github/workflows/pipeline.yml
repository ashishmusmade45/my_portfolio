name: Frontend Static CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  check-files:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify project files exist
        run: |
          test -f index.html
          test -f style.css
          test -f script.js

      - name: CI Passed
        run: echo "Static frontend project checked successfully"